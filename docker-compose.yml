version: "3.9"

# Lance uniquement les bases de données.
# L'app Streamlit tourne sur ton PC : streamlit run App/team_agent/app.py

services:

  redis:
    image: redis/redis-stack:latest
    container_name: team_agent_redis
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: team_agent_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: team_agent_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: planner_memory
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner_secret
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  chroma_data:
  postgres_data:
